# ─────────────────────────────────────────────────────────────
# config.yaml — Global shared config
# Per-tenant overrides live in: tenants/{tenant_id}/config.json
# ─────────────────────────────────────────────────────────────

# ── Embeddings (shared across all tenants) ────────────────────
embedding_model_name: "sentence-transformers/all-MiniLM-L6-v2"

huggingface:
  model_id: "sentence-transformers/all-MiniLM-L6-v2"
  cache_dir: "/app/.cache/huggingface"   # Linux (Docker) path

# ── Global flags (can be overridden per tenant in config.json) ─
use_summary_contextual_rag: False
use_keyword_in_meta_data: True
use_lexic_retrieval: False
re_process_data: False
chuncking_profile: False
use_query_contextuale: False
my_profile_name: "LightChat Assistant"

# ── Multi-tenant ──────────────────────────────────────────────
tenants_dir: "tenants"                   # root folder for all tenants

# ── Vector store defaults (overridden per tenant) ─────────────
vectorstore:
  provider: "faiss"
  dimension: 384
  metric: "cosine"
  faiss:
    persist_path: "tenants/{tenant_id}/vector_store"   # template — filled at runtime

# ── LLM config ────────────────────────────────────────────────
llm:
  provider: "groq"        # production: groq (cloud, no GPU needed)
                          # local dev:  ollama | llama_server

  groq:
    model: "llama-3.3-70b-versatile"
    temperature: 0.1

  openai:
    model: "gpt-4o-mini"
    temperature: 0.1

  ollama:
    active_model: "coder"           # switch: "coder" | "architect"
    base_url: "http://localhost:11434"

    models:
      coder:
        model_name: "qwen2.5-coder:3b"
        temperature: 0.3
        options:
          num_thread: 6
          num_ctx: 4096
          num_batch: 512
          repeat_penalty: 1.1
          use_mmap: true
          use_mlock: true

      architect:
        model_name: "qwen3.5:4b-q4_K_M"
        think: false                # disables thinking delay in Qwen 3.5
        temperature: 0.1
        options:
          num_thread: 6
          num_ctx: 4096
          num_batch: 512
          top_p: 0.9
          repeat_penalty: 1.1
          use_mmap: true
          use_mlock: true

  llama_server:
    base_url: "http://127.0.0.1:8080/v1"
    model: "Qwen3-4B"              # label only — ignored by llama-server
    temperature: 0.1