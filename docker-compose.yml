services:
  backend:
    build: .
    container_name: jitech-backend
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./tenants:/app/tenants
      - huggingface_cache:/app/.cache/huggingface
    environment:
      - ALLOWED_ORIGINS=https://jitechonline.com,https://www.jitechonline.com
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface

volumes:
  huggingface_cache: