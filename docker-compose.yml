services:
  backend:
    build: .
    container_name: jitech-backend
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./vector_store:/app/vector_store
      - huggingface_cache:/app/.cache/huggingface
    environment:
      - ALLOWED_ORIGINS=https://jitechonline.com,https://www.jitechonline.com

volumes:
  huggingface_cache: