name: Deploy Backend to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.aws_githup_key }}
          script: |
            TARGET_DIR="/home/ubuntu/lighchat"
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR

            # ── PROTECT: Backup vector stores before git reset ─────────────
            # git reset --hard will delete untracked files including vector_store
            # We backup first and restore after to preserve FAISS indexes.
            if [ -d "vector_store" ]; then
              echo "📦 Backing up root vector_store..."
              cp -r vector_store /tmp/vector_store_backup
            fi

            if [ -d "tenants" ]; then
              tenant_vs_dirs=$(find tenants -maxdepth 2 -type d -name 'vector_store' 2>/dev/null || true)
              if [ -n "$tenant_vs_dirs" ]; then
                echo "📦 Backing up tenant vector stores..."
                mkdir -p /tmp/tenant_vector_store_backup
                while IFS= read -r dir; do
                  mkdir -p "/tmp/tenant_vector_store_backup/$(dirname "$dir")"
                  cp -r "$dir" "/tmp/tenant_vector_store_backup/$dir"
                done <<< "$tenant_vs_dirs"
              fi
            fi

            # ── SYNC: Pull latest code from GitHub ─────────────────────────
            if [ ! -d ".git" ]; then
              echo "🆕 Fresh clone..."
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
            else
              echo "🔄 Updating existing code..."
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git fetch origin
              git reset --hard origin/main
            fi

            # ── PROTECT: Restore vector stores after git reset ─────────────
            # Sync Vector Store workflow handles index updates; deploy must never delete them.
            if [ -d "/tmp/vector_store_backup" ]; then
              echo "♻️ Restoring root vector_store..."
              cp -r /tmp/vector_store_backup vector_store
              rm -rf /tmp/vector_store_backup
              echo "✅ root vector_store restored successfully"
            fi

            if [ -d "/tmp/tenant_vector_store_backup" ]; then
              echo "♻️ Restoring tenant vector stores..."
              cp -r /tmp/tenant_vector_store_backup/tenants ./tenants
              rm -rf /tmp/tenant_vector_store_backup
              echo "✅ tenant vector stores restored successfully"
            fi

            # ── SECRETS: Recreate .env from GitHub secrets ─────────────────
            # .env is in .gitignore — never in repo — injected at deploy time
            echo "🔐 Writing .env..."
            echo "GROK_API_KEY=${{ secrets.GROK_API_KEY }}" > .env
            echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env
            echo "ALLOWED_ORIGINS=https://jitechonline.com,https://www.jitechonline.com" >> .env

            echo "🚀 Current version: $(git rev-parse --short HEAD)"

            # ── DEPLOY: Rebuild and restart backend container ───────────────
            docker stop jitech-backend || true
            docker rm jitech-backend || true
            docker image prune -f
            docker compose up -d --build backend

            echo "✅ Backend deployed successfully"
            echo "GROK_API_KEY=${{ secrets.GROK_API_KEY }}" > .env
            echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env